# Blueprint tham khảo cho Static Site FE (SPA routing).
# Nếu đã tạo service thủ công trên Render, thêm Rewrite trong Dashboard (xem README deploy).
services:
  - type: web
    name: pho-ruong-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run export:web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_ORIGIN
        value: https://pho-ruong-api.onrender.com
      - key: EXPO_PUBLIC_WS_URL
        value: wss://pho-ruong-api.onrender.com/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
